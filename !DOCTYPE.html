<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八大森林樂園｜暑假前哨站</title>

<style>
body {
    margin:0;
    font-family: "Noto Sans TC", sans-serif;
    background:#f5f5f5;
}

.hero {
    height:90vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
    background-size:cover;
    background-position:center;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:42px;
    margin-bottom:10px;
}

.hero p {
    font-size:20px;
    margin-bottom:20px;
}

.btn {
    padding:12px 24px;
    margin:5px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    text-decoration:none;
}

.section {
    padding:60px 20px;
    text-align:center;
}

.map img {
    width:90%;
    max-width:600px;
    border-radius:12px;
}

.cta {
    background:#111;
    color:white;
    padding:60px 20px;
}

.qr {
    width:200px;
    margin:20px auto;
}

.footer {
    padding:20px;
    text-align:center;
    background:#222;
    color:#aaa;
}
</style>
</head>

<body>

<!-- Hero -->
<div class="hero">
    <h1>今年暑假，不要再只是逛景點</h1>
    <p>走進森林，安排一場真正放鬆的假期</p>
    <a class="btn" href="https://8da-camp.epo.tw/" target="_blank">立即規劃行程</a>
</div>

<!-- 預熱 -->
<div class="section">
    <h2>暑假人潮還沒來，現在剛剛好</h2>
    <p>提前規劃、避開擁擠，享受最純粹的森林時光</p>
</div>

<!-- 地圖 -->
<div class="section map">
    <h2>園區探索</h2>
    <img src="map.png">
</div>

<!-- CTA -->
<div class="cta">
    <h2>暑假名額即將開放，先卡位的人先贏</h2>
    <p>掃描加入LINE，掌握第一手資訊</p>

    <img class="qr" src="qrcode.png">

    <div>
        <a class="btn" href="https://8da-camp.epo.tw/" target="_blank">前往官網</a>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    八大森林樂園｜官方網站
</div>

</body>
</html>
